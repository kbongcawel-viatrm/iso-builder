install_linux_hardened: true
enable_apparmor: true
lock_modules_after_boot: false

kernel_cmdline:
  - apparmor=1
  - security=apparmor
  - lockdown=confidentiality
  - module.sig_enforce=1
  - slab_nomerge
  - init_on_alloc=1
  - init_on_free=1
  - page_alloc.shuffle=1
  - pti=on
  - vsyscall=none

blacklisted_modules:
  - firewire-core
  - thunderbolt
  - floppy
  - pcspkr
