---
- name: Harden Arch Linux kernel
  hosts: localhost
  connection: local
  become: true

  vars_files:
    - groupvars/all.yml

  tasks:
    - name: Install hardening packages
      community.general.pacman:
        name: >-
          {{
           ['apparmor', 'ufw', 'audit', 'lynis']
           + (['linux-hardened', 'linux-hardened-headers'] if install_linux_hardened else [])
          }}
        state: present
        
    - template:
        src: templates/99-kernel-hardening.conf.j2
        dest: /etc/sysctl.d/99-kernel-hardening.conf

    - command: sysctl --system
      changed_when: true

    - template:
        src: templates/security-blacklist.conf.j2
        dest: /etc/modprobe.d/security-blacklist.conf

    - command: mkinitcpio -P
      changed_when: true

    - systemd:
        name: apparmor.service
        enabled: true
        state: started
      when: enable_apparmor | bool

    - template:
        src: templates/kernel-hardening.service.j2
        dest: /etc/systemd/system/kernel-hardening.service

    - systemd:
        daemon_reload: true

    - systemd:
        name: kernel-hardening.service
        enabled: true
        state: started

    - template:
        src: templates/grub-hardening.j2
        dest: /etc/default/grub

    - command: grub-mkconfig -o /boot/grub/grub.cfg
      changed_when: true
      
    - command: ufw logging high
      changed_when: true

    - command: ufw default deny incoming
      changed_when: true

    - command: ufw allow 443/tcp
      changed_when: true

    - command: ufw allow 53/tcp
      changed_when: true

    - command: ufw allow 53/udp
      changed_when: true

    - command: ufw --force enable
      changed_when: true

    - systemd:
      name: ufw.service
      enabled: true
      state: started
