name: Reset Tor Browser Data on Tails Linux

on:
  schedule:
    # Runs daily at 7:00 AM GMT+8 / Asia/Manila.
    # GitHub Actions cron is evaluated in UTC, so this is 23:00 UTC.
    - cron: "0 23 * * *"

  workflow_dispatch:
    inputs:
      target_browser:
        description: 'Target browser to clear cache'
        required: true
        default: 'tor-browser'
        type: choice
        options:
          - 'tor-browser'
          - 'firefox'
          - 'chrome'
          - 'edge'

      target_website:
        description: 'Target website to clear cache for (or "all")'
        required: true
        default: 'all'
        type: string

      reset_preferences:
        description: "Also reset Tor Browser prefs.js and related preference files"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"

      reset_site_data:
        description: "Also clear local storage, IndexedDB, cache, permissions, and service workers"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  generate-cache-script:
    name: Generate Cache Clearing Script
    uses: ./.github/workflows/clear-cache-reusable.yml
    with:
      target_browser: ${{ github.event.inputs.target_browser || 'tor-browser' }}
      target_website: ${{ github.event.inputs.target_website || 'all' }}
      output_format: 'script'

  execute-on-host:
    name: Execute Cache Clearing on Target Host
    needs: generate-cache-script
    runs-on: [self-hosted, tails-os]

    steps:
      - name: Check Tails/Linux environment
        shell: bash
        run: |
          set -euo pipefail

          echo "User: $(whoami)"
          echo "Home: $HOME"
          echo "Kernel: $(uname -a)"

          if [ -f /etc/os-release ]; then
            cat /etc/os-release
          fi

          if [ -f /etc/os-release ] && grep -qi "tails" /etc/os-release; then
            echo "✓ Detected Tails system"
          else
            echo "::warning::This runner does not appear to be Tails based on /etc/os-release."
            echo "::warning::Continuing anyway because this workflow is Linux-compatible."
          fi

      - name: Download cache clearing script
        run: |
          set -euo pipefail
          
          # Download the artifact from the previous job
          mkdir -p cache-scripts
          
          # Extract script content from job output
          SCRIPT_CONTENT='${{ needs.generate-cache-script.outputs.script_content }}'
          echo "$SCRIPT_CONTENT" > cache-scripts/clear-cache.sh
          chmod +x cache-scripts/clear-cache.sh
          
          echo "✓ Cache clearing script downloaded"
          echo ""
          echo "Script location: cache-scripts/clear-cache.sh"

      - name: Quit target browser
        shell: bash
        run: |
          set -euo pipefail

          BROWSER="${{ github.event.inputs.target_browser || 'tor-browser' }}"
          
          echo "Attempting to close $BROWSER gracefully..."

          case "$BROWSER" in
            tor-browser)
              pkill -TERM -u "$USER" -f "tor-browser" 2>/dev/null || true
              pkill -TERM -u "$USER" -f "Tor Browser" 2>/dev/null || true
              pkill -TERM -u "$USER" -f "firefox.real" 2>/dev/null || true
              ;;
            firefox)
              pkill -TERM -u "$USER" -f "firefox" 2>/dev/null || true
              ;;
            chrome)
              pkill -TERM -u "$USER" -f "chrome" 2>/dev/null || true
              pkill -TERM -u "$USER" -f "chromium" 2>/dev/null || true
              ;;
            edge)
              pkill -TERM -u "$USER" -f "microsoft-edge" 2>/dev/null || true
              ;;
          esac

          sleep 5

          echo "Force-stopping any remaining processes..."

          case "$BROWSER" in
            tor-browser)
              pkill -KILL -u "$USER" -f "tor-browser" 2>/dev/null || true
              pkill -KILL -u "$USER" -f "Tor Browser" 2>/dev/null || true
              pkill -KILL -u "$USER" -f "firefox.real" 2>/dev/null || true
              ;;
            firefox)
              pkill -KILL -u "$USER" -f "firefox" 2>/dev/null || true
              ;;
            chrome)
              pkill -KILL -u "$USER" -f "chrome" 2>/dev/null || true
              pkill -KILL -u "$USER" -f "chromium" 2>/dev/null || true
              ;;
            edge)
              pkill -KILL -u "$USER" -f "microsoft-edge" 2>/dev/null || true
              ;;
          esac

          echo "✓ Browser processes stopped"

      - name: Execute cache clearing script
        shell: bash
        run: |
          set -euo pipefail
          
          echo "Executing cache clearing script..."
          ./cache-scripts/clear-cache.sh
          
          echo ""
          echo "✓ Cache clearing completed successfully"

      - name: Clear preferences (Tor Browser only)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.reset_preferences == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          BROWSER="${{ github.event.inputs.target_browser || 'tor-browser' }}"
          
          if [ "$BROWSER" != "tor-browser" ]; then
            echo "Skipping preference reset - not a Tor Browser"
            exit 0
          fi

          echo "Resetting Tor Browser preference files..."

          PROFILE_CANDIDATES=(
            "$HOME/.tor-browser/profile.default"
            "$HOME/.tor-browser/profile.default-esr"
            "$HOME/Browser/TorBrowser/Data/Browser/profile.default"
            "/home/amnesia/.tor-browser/profile.default"
            "/home/amnesia/.tor-browser/profile.default-esr"
          )

          for PROFILE_DIR in "${PROFILE_CANDIDATES[@]}"; do
            if [ -d "$PROFILE_DIR" ]; then
              echo "Found profile at: $PROFILE_DIR"
              rm -f "$PROFILE_DIR/prefs.js"
              rm -f "$PROFILE_DIR/user.js"
              echo "✓ Preferences reset"
              break
            fi
          done

      - name: Clear site data (if requested)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.reset_site_data == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          BROWSER="${{ github.event.inputs.target_browser || 'tor-browser' }}"
          
          if [ "$BROWSER" != "tor-browser" ]; then
            echo "Skipping site data clear - optimized for Tor Browser"
            exit 0
          fi

          echo "Clearing Tor Browser site data..."

          PROFILE_CANDIDATES=(
            "$HOME/.tor-browser/profile.default"
            "$HOME/.tor-browser/profile.default-esr"
            "$HOME/Browser/TorBrowser/Data/Browser/profile.default"
            "/home/amnesia/.tor-browser/profile.default"
            "/home/amnesia/.tor-browser/profile.default-esr"
          )

          for PROFILE_DIR in "${PROFILE_CANDIDATES[@]}"; do
            if [ -d "$PROFILE_DIR" ]; then
              echo "Clearing site data in: $PROFILE_DIR"
              rm -f "$PROFILE_DIR/webappsstore.sqlite"*
              rm -f "$PROFILE_DIR/permissions.sqlite"*
              rm -f "$PROFILE_DIR/content-prefs.sqlite"*
              rm -rf "$PROFILE_DIR/storage/default"
              rm -rf "$PROFILE_DIR/storage/permanent"
              rm -rf "$PROFILE_DIR/storage/temporary"
              rm -rf "$PROFILE_DIR/indexedDB"
              rm -rf "$PROFILE_DIR/cache2"
              rm -rf "$PROFILE_DIR/startupCache"
              rm -rf "$PROFILE_DIR/serviceworker"
              rm -rf "$PROFILE_DIR/sessionstore-backups"
              echo "✓ Site data cleared"
              break
            fi
          done

      - name: Create backup of cleared data
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          BACKUP_ROOT="$HOME/cache-clear-backups"
          BACKUP_DIR="$BACKUP_ROOT/backup-$(date -u +%Y%m%d-%H%M%S)"

          mkdir -p "$BACKUP_DIR"

          echo "Backup location: $BACKUP_DIR"
          echo "Cache clearing operation completed at: $(date -u)"

          # Store operation summary
          cat > "$BACKUP_DIR/operation-summary.txt" << EOF
          Cache Clearing Operation Summary
          ================================
          Browser: ${{ github.event.inputs.target_browser || 'tor-browser' }}
          Website: ${{ github.event.inputs.target_website || 'all' }}
          Reset Preferences: ${{ github.event.inputs.reset_preferences || 'true' }}
          Reset Site Data: ${{ github.event.inputs.reset_site_data || 'true' }}
          Timestamp: $(date -u)
          EOF

          cat "$BACKUP_DIR/operation-summary.txt"

      - name: Generate workflow summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Cache Clearing Execution Complete
          
          ✓ **Status**: Success
          
          ### Execution Details
          - **Browser**: ${{ github.event.inputs.target_browser || 'tor-browser' }}
          - **Website**: ${{ github.event.inputs.target_website || 'all' }}
          - **Host**: [self-hosted, tails-os]
          - **Timestamp**: $(date -u)
          
          ### Operations Performed
          - ✓ Cache and cookies cleared
          - ${{ github.event_name == 'schedule' || github.event.inputs.reset_preferences == 'true' && '✓ Preferences reset' || '✗ Preferences not reset' }}
          - ${{ github.event_name == 'schedule' || github.event.inputs.reset_site_data == 'true' && '✓ Site data cleared' || '✗ Site data not cleared' }}
          
          ### Next Steps
          The target browser can now be safely reopened with a clean cache state.
          EOF
