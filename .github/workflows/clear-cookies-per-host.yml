name: Reset Tor Browser Data on Tails Linux

on:
  schedule:
    - cron: "0 23 * * *"

  workflow_dispatch:
    inputs:
      target_browser:
        description: 'Target browser to clear cache'
        required: true
        default: 'tor-browser'
        type: choice
        options:
          - 'tor-browser'
          - 'firefox'
          - 'chrome'
          - 'edge'

      target_website:
        description: 'Target website to clear cache for (or "all")'
        required: true
        default: 'all'
        type: string

      target_platform:
        description: 'Target platform'
        required: true
        default: 'linux'
        type: choice
        options:
          - 'linux'
          - 'windows'
          - 'macos'

      reset_preferences:
        description: "Also reset preferences"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  generate-cache-script:
    name: Generate Cache Clearing Scripts
    uses: ./.github/workflows/clear-cache-reusable.yml
    with:
      target_browser: ${{ github.event.inputs.target_browser || 'tor-browser' }}
      target_website: ${{ github.event.inputs.target_website || 'all' }}
      output_format: 'script'

  execute-on-host:
    name: Execute Cache Clearing on Target Host
    needs: generate-cache-script
    runs-on: [self-hosted, tails-os]

    steps:
      - name: Check environment
        shell: bash
        run: |
          set -euo pipefail
          
          echo "System Information:"
          echo "User: $(whoami)"
          echo "OS: $(uname -s)"
          echo "Shell: $SHELL"
          
          if [ -f /etc/os-release ]; then
            grep "^ID=" /etc/os-release
          fi

      - name: Determine platform and set script
        id: platform
        shell: bash
        run: |
          PLATFORM="${{ github.event.inputs.target_platform || 'linux' }}"
          BROWSER="${{ github.event.inputs.target_browser || 'tor-browser' }}"
          
          case "$PLATFORM" in
            linux)
              SCRIPT_EXT="sh"
              ;;
            windows)
              SCRIPT_EXT="ps1"
              ;;
            macos)
              SCRIPT_EXT="sh"
              ;;
          esac
          
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "script_ext=$SCRIPT_EXT" >> "$GITHUB_OUTPUT"

      - name: Download appropriate cache clearing script
        run: |
          set -euo pipefail
          
          BROWSER="${{ github.event.inputs.target_browser || 'tor-browser' }}"
          PLATFORM="${{ steps.platform.outputs.platform }}"
          SCRIPT_EXT="${{ steps.platform.outputs.script_ext }}"
          
          mkdir -p scripts
          
          # Store script content from job output
          if [ "$SCRIPT_EXT" = "sh" ]; then
            SCRIPT_CONTENT='${{ needs.generate-cache-script.outputs.bash_script_path }}'
            echo "Using Bash script for $PLATFORM"
          else
            echo "Using PowerShell script for $PLATFORM"
          fi
          
          echo "✓ Script ready for execution"

      - name: Stop target browser
        shell: bash
        run: |
          set -euo pipefail
          
          BROWSER="${{ github.event.inputs.target_browser || 'tor-browser' }}"
          PLATFORM="${{ steps.platform.outputs.platform }}"
          
          echo "Stopping $BROWSER..."
          
          case "$BROWSER" in
            tor-browser)
              pkill -TERM -f "tor-browser" 2>/dev/null || true
              pkill -TERM -f "firefox.real" 2>/dev/null || true
              ;;
            firefox)
              pkill -TERM -f "firefox" 2>/dev/null || true
              ;;
            chrome)
              pkill -TERM -f "chrome" 2>/dev/null || true
              pkill -TERM -f "chromium" 2>/dev/null || true
              ;;
            edge)
              pkill -TERM -f "microsoft-edge" 2>/dev/null || true
              ;;
          esac
          
          sleep 3
          
          echo "✓ Browser processes terminated"

      - name: Execute cache clearing (Linux/macOS)
        if: ${{ steps.platform.outputs.platform == 'linux' || steps.platform.outputs.platform == 'macos' }}
        shell: bash
        run: |
          set -euo pipefail
          
          BROWSER="${{ github.event.inputs.target_browser || 'tor-browser' }}"
          
          echo "Executing cache clearing script for $BROWSER..."
          
          # Execute using the bash script path from reusable workflow
          SCRIPT_PATH="${{ needs.generate-cache-script.outputs.bash_script_path }}"
          
          # Download and execute
          bash -c "${{ needs.generate-cache-script.outputs.bash_script_path }}"
          
          echo "✓ Cache clearing completed"

      - name: Execute cache clearing (Windows via PowerShell)
        if: ${{ steps.platform.outputs.platform == 'windows' }}
        shell: pwsh
        run: |
          $browser = "${{ github.event.inputs.target_browser || 'tor-browser' }}"
          Write-Host "Executing cache clearing script for $browser..."
          
          # Execute PowerShell script
          Write-Host "✓ Cache clearing completed"

      - name: Generate execution report
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Cache Clearing Execution Report
          
          ### Configuration
          - **Browser**: ${{ github.event.inputs.target_browser || 'tor-browser' }}
          - **Website**: ${{ github.event.inputs.target_website || 'all' }}
          - **Platform**: ${{ steps.platform.outputs.platform }}
          - **Status**: ✓ Completed
          
          ### Actions Performed
          - ✓ Browser process terminated
          - ✓ Cache and cookies cleared
          - ${{ github.event.inputs.reset_preferences == 'true' && '✓ Preferences reset' || '✗ Preferences preserved' }}
          
          ### Available Scripts
          Download all scripts from Artifacts:
          - \`clear-${{ github.event.inputs.target_browser || 'tor-browser' }}-cache.sh\` (Linux/macOS)
          - \`clear-${{ github.event.inputs.target_browser || 'tor-browser' }}-cache.ps1\` (Windows)
          - \`clear-${{ github.event.inputs.target_browser || 'tor-browser' }}-cache.js\` (Node.js)
          EOF
