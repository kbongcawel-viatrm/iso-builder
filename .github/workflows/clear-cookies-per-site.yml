name: Clear Cookies Per Site

on:
  workflow_dispatch:
    inputs:
      actor:
        description: 'Actor/Username triggering this workflow'
        required: false

jobs:
  clear_cookies_by_actor:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify Actor Permissions
        id: check-actor
        run: |
          TRIGGERED_BY="${{ github.actor }}"
          echo "Workflow triggered by: $TRIGGERED_BY"
          # Ensure the actor matches the expected permissions
          if [ "$TRIGGERED_BY" != "$TRIGGERED_BY" ]; then
            echo "This workflow can only be triggered by its actor!"
            exit 1
          fi

      - name: Clear cookies for multiple domains
        run: |
          DOMAINS=(google.com github.com chatgpt.com uorigin.com mozilla)
          for DOMAIN in "${DOMAINS[@]}"; do
            # 1. First request saves cookies
            curl -c cookies.txt "https://$DOMAIN"

            # 2. Reset the site-specific cookies from the jar
            sed -i "/:\/\/$DOMAIN/d" cookies.txt

            # 3. Next request runs with a reset state for that site
            curl -b cookies.txt -c cookies.txt "https://$DOMAIN"
          done

      - name: Generate Cache Refresh Links
        run: |
          mkdir -p cache-refresh-scripts

          # Mozilla-based browser cache-clearing link/script
          echo '#!/bin/bash' > cache-refresh-scripts/refresh-mozilla-cache.sh
          echo 'rm -rf ~/.mozilla/firefox/*/cache*' >> cache-refresh-scripts/refresh-mozilla-cache.sh
          chmod +x cache-refresh-scripts/refresh-mozilla-cache.sh

          # Chrome-based browser cache-clearing link/script
          echo '#!/bin/bash' > cache-refresh-scripts/refresh-chrome-cache.sh
          echo 'rm -rf ~/.config/google-chrome/Default/Cache*' >> cache-refresh-scripts/refresh-chrome-cache.sh
          chmod +x cache-refresh-scripts/refresh-chrome-cache.sh

          # Safari-based browser cache-clearing link/script
          echo '#!/bin/bash' > cache-refresh-scripts/refresh-safari-cache.sh
          echo 'rm -rf ~/Library/Caches/com.apple.Safari*' >> cache-refresh-scripts/refresh-safari-cache.sh
          chmod +x cache-refresh-scripts/refresh-safari-cache.sh

          echo "Cache refresh scripts generated for Mozilla, Chrome, and Safari browsers."