name: Clear Cookies Per Site

on:
  workflow_dispatch:
    inputs:
      target_browser:
        description: 'Target browser to clear cache'
        required: true
        default: 'firefox'
        type: choice
        options:
          - 'firefox'
          - 'chrome'
          - 'safari'
          - 'edge'
          - 'tor-browser'

      target_website:
        description: 'Target website to clear cache for'
        required: true
        type: string

jobs:
  generate-cache-script:
    name: Generate Cache Clearing Artifacts
    uses: ./.github/workflows/clear-cache-reusable.yml
    with:
      target_browser: ${{ github.event.inputs.target_browser }}
      target_website: ${{ github.event.inputs.target_website }}
      output_format: 'script'

  generate-web-interface:
    name: Generate Mobile-Friendly Web Interface
    needs: generate-cache-script
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Create mobile-friendly HTML interface
        run: |
          set -euo pipefail
          
          BROWSER="${{ github.event.inputs.target_browser }}"
          WEBSITE="${{ github.event.inputs.target_website }}"
          OUTPUT_DIR="web-interface"
          
          mkdir -p "$OUTPUT_DIR"
          
          cat > "$OUTPUT_DIR/index.html" << 'EOFHTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Cache Clearer - $BROWSER</title>
              <style>
                  * {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                  }
                  
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      padding: 20px;
                  }
                  
                  .container {
                      background: white;
                      border-radius: 16px;
                      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                      max-width: 500px;
                      width: 100%;
                      overflow: hidden;
                  }
                  
                  .header {
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                      padding: 40px 20px;
                      text-align: center;
                  }
                  
                  .header h1 {
                      font-size: 28px;
                      margin-bottom: 10px;
                  }
                  
                  .header p {
                      opacity: 0.9;
                      font-size: 14px;
                  }
                  
                  .content {
                      padding: 30px 20px;
                  }
                  
                  .config-box {
                      background: #f8f9fa;
                      border-radius: 12px;
                      padding: 20px;
                      margin-bottom: 25px;
                      border-left: 4px solid #667eea;
                  }
                  
                  .config-item {
                      margin-bottom: 15px;
                  }
                  
                  .config-item:last-child {
                      margin-bottom: 0;
                  }
                  
                  .config-label {
                      font-size: 12px;
                      text-transform: uppercase;
                      color: #666;
                      font-weight: 600;
                      margin-bottom: 5px;
                      letter-spacing: 0.5px;
                  }
                  
                  .config-value {
                      font-size: 18px;
                      font-weight: 600;
                      color: #333;
                      word-break: break-all;
                  }
                  
                  .browser-icon {
                      display: inline-block;
                      width: 32px;
                      height: 32px;
                      margin-right: 10px;
                      vertical-align: middle;
                  }
                  
                  .action-section {
                      margin-bottom: 25px;
                  }
                  
                  .action-title {
                      font-size: 14px;
                      font-weight: 600;
                      text-transform: uppercase;
                      color: #666;
                      margin-bottom: 15px;
                      letter-spacing: 0.5px;
                  }
                  
                  .button-group {
                      display: flex;
                      gap: 10px;
                      flex-wrap: wrap;
                  }
                  
                  button {
                      flex: 1;
                      min-width: 140px;
                      padding: 15px;
                      border: none;
                      border-radius: 8px;
                      font-size: 14px;
                      font-weight: 600;
                      cursor: pointer;
                      transition: all 0.3s ease;
                      text-transform: uppercase;
                      letter-spacing: 0.5px;
                  }
                  
                  .btn-primary {
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                  }
                  
                  .btn-primary:hover {
                      transform: translateY(-2px);
                      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
                  }
                  
                  .btn-secondary {
                      background: #e8eef7;
                      color: #667eea;
                  }
                  
                  .btn-secondary:hover {
                      background: #d4ddf0;
                  }
                  
                  .btn-success {
                      background: #4caf50;
                      color: white;
                  }
                  
                  .btn-success:hover {
                      background: #45a049;
                      transform: translateY(-2px);
                  }
                  
                  .btn-disabled {
                      opacity: 0.6;
                      cursor: not-allowed;
                  }
                  
                  .instructions {
                      background: #fff3cd;
                      border-left: 4px solid #ffc107;
                      border-radius: 8px;
                      padding: 15px;
                      margin-bottom: 20px;
                      font-size: 13px;
                      line-height: 1.6;
                  }
                  
                  .instructions p {
                      margin-bottom: 10px;
                  }
                  
                  .instructions ol {
                      margin-left: 20px;
                      margin-bottom: 10px;
                  }
                  
                  .instructions li {
                      margin-bottom: 8px;
                  }
                  
                  .code-block {
                      background: #f5f5f5;
                      border: 1px solid #ddd;
                      border-radius: 6px;
                      padding: 12px;
                      font-family: "Courier New", monospace;
                      font-size: 12px;
                      overflow-x: auto;
                      margin: 10px 0;
                      line-height: 1.4;
                  }
                  
                  .copy-btn {
                      font-size: 11px;
                      padding: 6px 12px;
                      margin-top: 8px;
                      min-width: auto;
                      width: 100%;
                  }
                  
                  .status-message {
                      display: none;
                      padding: 15px;
                      border-radius: 8px;
                      margin-bottom: 20px;
                      font-size: 14px;
                  }
                  
                  .status-success {
                      background: #d4edda;
                      color: #155724;
                      border: 1px solid #c3e6cb;
                  }
                  
                  .status-error {
                      background: #f8d7da;
                      color: #721c24;
                      border: 1px solid #f5c6cb;
                  }
                  
                  .tabs {
                      display: flex;
                      gap: 10px;
                      margin-bottom: 20px;
                      border-bottom: 2px solid #e0e0e0;
                  }
                  
                  .tab-button {
                      flex: 1;
                      padding: 12px;
                      background: none;
                      border: none;
                      border-bottom: 3px solid transparent;
                      color: #666;
                      font-weight: 600;
                      cursor: pointer;
                      transition: all 0.3s;
                      margin-bottom: -2px;
                  }
                  
                  .tab-button.active {
                      color: #667eea;
                      border-bottom-color: #667eea;
                  }
                  
                  .tab-content {
                      display: none;
                  }
                  
                  .tab-content.active {
                      display: block;
                  }
                  
                  .progress-bar {
                      width: 100%;
                      height: 4px;
                      background: #e0e0e0;
                      border-radius: 2px;
                      overflow: hidden;
                      margin: 20px 0;
                  }
                  
                  .progress-fill {
                      height: 100%;
                      background: linear-gradient(90deg, #667eea, #764ba2);
                      width: 0%;
                      transition: width 0.3s ease;
                  }
                  
                  .footer {
                      text-align: center;
                      padding: 15px;
                      background: #f8f9fa;
                      font-size: 12px;
                      color: #999;
                      border-top: 1px solid #e0e0e0;
                  }
                  
                  @media (max-width: 480px) {
                      .content {
                          padding: 20px 15px;
                      }
                      
                      button {
                          min-width: 100%;
                      }
                      
                      .button-group {
                          flex-direction: column;
                      }
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="header">
                      <h1>🧹 Cache Clearer</h1>
                      <p>Clear cache and cookies safely</p>
                  </div>
                  
                  <div class="content">
                      <div id="statusMessage" class="status-message"></div>
                      
                      <div class="config-box">
                          <div class="config-item">
                              <div class="config-label">Browser</div>
                              <div class="config-value">
                                  <span id="browserName">$BROWSER</span>
                              </div>
                          </div>
                          <div class="config-item">
                              <div class="config-label">Website</div>
                              <div class="config-value">
                                  <span id="websiteName">$WEBSITE</span>
                              </div>
                          </div>
                          <div class="config-item">
                              <div class="config-label">Requested By</div>
                              <div class="config-value">
                                  <span id="actorName">GitHub Actions</span>
                              </div>
                          </div>
                      </div>
                      
                      <div class="action-section">
                          <div class="action-title">📋 Instructions</div>
                          <div class="tabs">
                              <button class="tab-button active" onclick="switchTab('automated')">Automated</button>
                              <button class="tab-button" onclick="switchTab('manual')">Manual</button>
                          </div>
                          
                          <div id="automated" class="tab-content active">
                              <div class="instructions">
                                  <p><strong>Automated Method (Recommended):</strong></p>
                                  <ol>
                                      <li>Download the cache clearing script</li>
                                      <li>Run the script on your computer</li>
                                      <li>Browser cache will be automatically cleared</li>
                                  </ol>
                              </div>
                          </div>
                          
                          <div id="manual" class="tab-content">
                              <div class="instructions" id="manualInstructions">
                                  <p><strong>Manual Method:</strong></p>
                                  <p>Follow these steps to manually clear cache in $BROWSER</p>
                              </div>
                          </div>
                      </div>
                      
                      <div class="action-section">
                          <div class="action-title">⚙️ Download & Run</div>
                          <div class="button-group">
                              <button class="btn-primary" onclick="downloadScript('sh')">📥 Linux/Mac</button>
                              <button class="btn-primary" onclick="downloadScript('ps1')">📥 Windows</button>
                          </div>
                          <div class="button-group" style="margin-top: 10px;">
                              <button class="btn-secondary" onclick="downloadScript('js')">📥 Node.js</button>
                              <button class="btn-secondary" onclick="copyCommand()">📋 Copy Command</button>
                          </div>
                      </div>
                      
                      <div class="action-section">
                          <div class="action-title">🔧 Quick Commands</div>
                          <div id="quickCommand" class="code-block"></div>
                          <button class="btn-secondary copy-btn" onclick="copyQuickCommand()">Copy Command</button>
                      </div>
                  </div>
                  
                  <div class="footer">
                      Generated on: <span id="timestamp"></span>
                      <br>
                      Workflow Run: <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" target="_blank">View Details</a>
                  </div>
              </div>
              
              <script>
                  const BROWSER = '$BROWSER';
                  const WEBSITE = '$WEBSITE';
                  const ACTOR = '${{ github.actor }}';
                  
                  // Set timestamp
                  document.getElementById('timestamp').textContent = new Date().toLocaleString();
                  document.getElementById('actorName').textContent = ACTOR || 'Anonymous';
                  
                  // Browser-specific instructions
                  const manualInstructions = {
                      firefox: `
                          <p><strong>Firefox:</strong></p>
                          <ol>
                              <li>Click the hamburger menu (☰) in the top right</li>
                              <li>Select "History" → "Clear Recent History"</li>
                              <li>Choose "Everything" for Time Range</li>
                              <li>Check "Cookies" and "Cache"</li>
                              <li>Click "Clear Now"</li>
                          </ol>
                      `,
                      chrome: `
                          <p><strong>Google Chrome:</strong></p>
                          <ol>
                              <li>Press Ctrl+Shift+Delete (or Cmd+Shift+Delete on Mac)</li>
                              <li>Select "All time" for Time range</li>
                              <li>Check "Cookies and other site data" and "Cached images and files"</li>
                              <li>Click "Clear data"</li>
                          </ol>
                      `,
                      safari: `
                          <p><strong>Safari:</strong></p>
                          <ol>
                              <li>Click "Safari" in menu bar</li>
                              <li>Select "Clear History..."</li>
                              <li>Choose "All history"</li>
                              <li>Click "Clear History"</li>
                          </ol>
                      `,
                      edge: `
                          <p><strong>Microsoft Edge:</strong></p>
                          <ol>
                              <li>Press Ctrl+Shift+Delete</li>
                              <li>Select "All time"</li>
                              <li>Check "Cookies and other site data" and "Cached images and files"</li>
                              <li>Click "Clear now"</li>
                          </ol>
                      `,
                      'tor-browser': `
                          <p><strong>Tor Browser:</strong></p>
                          <ol>
                              <li>Click the hamburger menu (☰)</li>
                              <li>Select "History" → "Clear Recent History"</li>
                              <li>Choose "Everything"</li>
                              <li>Check "Cookies" and "Cache"</li>
                              <li>Click "Clear Now"</li>
                          </ol>
                      `
                  };
                  
                  const quickCommands = {
                      firefox: 'pkill firefox && rm -rf ~/.mozilla/firefox/*/cache* ~/.mozilla/firefox/*/cookies.sqlite*',
                      chrome: 'pkill chrome && rm -rf ~/.config/google-chrome/Default/Cache*',
                      safari: 'rm -rf ~/Library/Caches/com.apple.Safari',
                      edge: 'pkill microsoft-edge && rm -rf ~/.config/microsoft-edge/Default/Cache*',
                      'tor-browser': 'pkill tor-browser && rm -f ~/.tor-browser/profile.default*/cookies.sqlite*'
                  };
                  
                  function switchTab(tabName) {
                      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                      document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
                      document.getElementById(tabName).classList.add('active');
                      event.target.classList.add('active');
                  }
                  
                  function downloadScript(type) {
                      const scripts = {
                          'sh': 'clear-$BROWSER-cache.sh',
                          'ps1': 'clear-$BROWSER-cache.ps1',
                          'js': 'clear-$BROWSER-cache.js'
                      };
                      alert('Download: ' + scripts[type] + '\n\nThis file is available in the GitHub Actions workflow artifacts.');
                  }
                  
                  function copyCommand() {
                      const cmd = quickCommands[BROWSER] || '';
                      if (cmd) {
                          navigator.clipboard.writeText(cmd).then(() => {
                              showStatus('✓ Command copied to clipboard!', 'success');
                          });
                      }
                  }
                  
                  function copyQuickCommand() {
                      copyCommand();
                  }
                  
                  function showStatus(message, type) {
                      const statusEl = document.getElementById('statusMessage');
                      statusEl.textContent = message;
                      statusEl.className = 'status-message status-' + type;
                      statusEl.style.display = 'block';
                      setTimeout(() => {
                          statusEl.style.display = 'none';
                      }, 3000);
                  }
                  
                  // Set up quick command
                  const quickCmd = quickCommands[BROWSER];
                  if (quickCmd) {
                      document.getElementById('quickCommand').textContent = quickCmd;
                  }
                  
                  // Set up manual instructions
                  const manualInst = manualInstructions[BROWSER];
                  if (manualInst) {
                      document.getElementById('manualInstructions').innerHTML = manualInst;
                  }
              </script>
          </body>
          </html>
          EOFHTML
          
          echo "✓ Mobile-friendly web interface created"

      - name: Create instruction documents
        run: |
          set -euo pipefail
          
          BROWSER="${{ github.event.inputs.target_browser }}"
          WEBSITE="${{ github.event.inputs.target_website }}"
          OUTPUT_DIR="web-interface"
          
          cat > "$OUTPUT_DIR/README.md" << 'EOFMD'
          # Cache Clearing Instructions
          
          **Browser:** $BROWSER  
          **Website:** $WEBSITE  
          **Generated:** $(date)
          
          ## Quick Start
          
          ### Method 1: Open in Browser (Mobile-Friendly)
          
          Open `index.html` in any web browser on your phone or computer.
          
          ### Method 2: Download Script
          
          Download the appropriate script for your operating system:
          - **Linux/macOS:** `clear-$BROWSER-cache.sh`
          - **Windows:** `clear-$BROWSER-cache.ps1`
          - **Node.js:** `clear-$BROWSER-cache.js`
          
          Run the downloaded script to automatically clear the cache.
          
          ### Method 3: Manual Commands
          
          Copy and paste the quick command for your system.
          EOFMD

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cache-clearing-web-interface
          path: web-interface/
          retention-days: 7

      - name: Generate workflow summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Cache Clearing Web Interface Generated
          
          ### 📱 Mobile-Friendly Interface
          - **Browser**: ${{ github.event.inputs.target_browser }}
          - **Website**: ${{ github.event.inputs.target_website }}
          - **Requested by**: ${{ github.actor }}
          
          ### 📥 Available Downloads
          
          All files are ready for download:
          
          1. **index.html** - Mobile-friendly web interface
             - Open in any browser on your phone or computer
             - Interactive instructions and one-click commands
          
          2. **clear-${{ github.event.inputs.target_browser }}-cache.sh**
             - For Linux and macOS
          
          3. **clear-${{ github.event.inputs.target_browser }}-cache.ps1**
             - For Windows PowerShell
          
          4. **clear-${{ github.event.inputs.target_browser }}-cache.js**
             - For Node.js (platform-agnostic)
          
          5. **README.md** - Full instructions
          
          ### 🚀 How to Use
          
          **On Desktop/Laptop:**
          - Download the script for your OS
          - Run it in terminal/PowerShell
          
          **On Mobile:**
          1. Download \`index.html\`
          2. Open it in your phone's browser
          3. Follow the interactive instructions
          4. Or copy the quick command and paste it
          
          ### 📍 Link to Artifacts
          
          [Download All Files](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ---
          
          **Timestamp**: $(date -u)
          EOF
