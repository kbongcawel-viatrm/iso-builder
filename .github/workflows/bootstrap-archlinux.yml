name: Hardening and Bootstrapping Arch Linux

on:
  workflow_dispatch:
    inputs:
      check_mode:
        description: "Run Ansible in dry-run mode"
        required: false
        default: false
        type: boolean

  push:
    branches:
       - main

concurrency:
    group: arch-bootstrap
    cancel-in-progress: false

env:
    PYTHONUNBUFFERED: 1
    
jobs:
  validate:
    name: Validate Playbooks
    runs-on: ubuntu-latest
    defaults:
      run: 
        working-directory:  /home/runner/work/iso-builder/iso-builder/
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
             set -euxo pipefail

             ansible-galaxy collection install \
             community.general

      - name: Syntax check harden.yml
        run: |
             cd ansible/hardening/archlinux/
             ansible-playbook \
               -c local \
               harden.yml \
               --syntax-check

      - name: Syntax check desktop.yml
        run: |
             cd ansible/hardening/archlinux
             ansible-playbook \
               -c local \
               desktop.yml \
               --syntax-check

  deploy:
    name: Apply Playbooks

    runs-on:
      - self-hosted
      - archlinux

    needs:
      - validate

    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 120

    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}/ansible/hardening/archlinux

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        run: |
           set -euxo pipefail
           if ! command -v python >/dev/null 2>&1; then
             sudo pacman -Syu --noconfirm python
           else
             echo "Using $(python -V)"
           fi

      - name: Install dependencies
        run: |
          set -euxo pipefail
          
          if ! command -v ansible > /dev/null 2>&1; then
          sudo pacman -Syu --noconfirm ansible
          else
            echo "Using $(ansible --version)"
          fi
          
          ansible-galaxy collection install \
            community.general

      - name: Run hardening playbook
        run: |
          EXTRA="--ask-become-pass"

          if [ "${{ inputs.check_mode }}" = "true" ]; then
            EXTRA="--ask-become-pass --check"
          fi
          
          cd "${{ github.workspace }}/ansible/hardening/archlinux"
          ansible-playbook \
            -c local \
            harden.yml \
            --diff -e "install_linux_hardened=true enable_apparmor=true lock_modules_after_boot=false" \
          $EXTRA 

      - name: Run desktop playbook
        run: |
          EXTRA="--ask-become-pass"


          if [ "${{ inputs.check_mode }}" = "true" ]; then
            EXTRA="--check"
          fi
          
          cd "${{ github.workspace }}/ansible/hardening/archlinux"
          ansible-playbook \
           -c local \
           desktop.yml \
           --diff -e "install_linux_hardened=true enable_apparmor=true lock_modules_after_boot=false" \
          $EXTRA
      - name: Show completion
        run: |
          echo "Playbook deployment finished"
     
      - name: Get Secureboot Status
        run: |
              set -euxo pipefail
              sudo mokutil --sb-state
              bootctl status
              echo "Done"
