name: Reusable Cache Clearing Workflow

on:
  workflow_call:
    inputs:
      target_browser:
        description: 'Target browser to clear cache (tor-browser, firefox, chrome, safari, edge)'
        required: true
        type: string
      target_website:
        description: 'Target website/domain to clear cache for (e.g., github.com, google.com, or "all")'
        required: true
        type: string
      output_format:
        description: 'Output format: script (bash/powershell/js), link (clickable links), or both'
        required: false
        type: string
        default: 'script'
    outputs:
      bash_script_path:
        description: 'Path to the generated Bash script'
        value: ${{ jobs.generate-cache-clearing.outputs.bash_script_path }}
      powershell_script_path:
        description: 'Path to the generated PowerShell script'
        value: ${{ jobs.generate-cache-clearing.outputs.powershell_script_path }}
      javascript_code:
        description: 'JavaScript code for platform-agnostic execution'
        value: ${{ jobs.generate-cache-clearing.outputs.javascript_code }}
      cache_paths:
        description: 'JSON array of cache paths for the target browser'
        value: ${{ jobs.generate-cache-clearing.outputs.cache_paths }}

jobs:
  generate-cache-clearing:
    name: Generate Multi-Platform Cache Clearing Artifacts
    runs-on: ubuntu-latest
    
    outputs:
      bash_script_path: ${{ steps.generate-scripts.outputs.bash_script_path }}
      powershell_script_path: ${{ steps.generate-scripts.outputs.powershell_script_path }}
      javascript_code: ${{ steps.generate-scripts.outputs.javascript_code }}
      cache_paths: ${{ steps.generate-scripts.outputs.cache_paths }}
    
    steps:
      - name: Validate inputs
        run: |
          set -euo pipefail
          
          BROWSER="${{ inputs.target_browser }}"
          WEBSITE="${{ inputs.target_website }}"
          
          echo "Validating inputs..."
          echo "Target Browser: $BROWSER"
          echo "Target Website: $WEBSITE"
          echo "Output Format: ${{ inputs.output_format }}"
          
          # Validate browser
          case "$BROWSER" in
            tor-browser|firefox|chrome|safari|edge)
              echo "✓ Valid browser: $BROWSER"
              ;;
            *)
              echo "✗ Invalid browser: $BROWSER"
              echo "Supported: tor-browser, firefox, chrome, safari, edge"
              exit 1
              ;;
          esac

      - name: Generate multi-platform cache clearing scripts
        id: generate-scripts
        run: |
          set -euo pipefail
          
          BROWSER="${{ inputs.target_browser }}"
          WEBSITE="${{ inputs.target_website }}"
          SCRIPT_DIR="cache-clearing-scripts"
          mkdir -p "$SCRIPT_DIR"
          
          # ============= BASH SCRIPT =============
          BASH_FILE="$SCRIPT_DIR/clear-${BROWSER}-cache.sh"
          
          echo "Generating Bash script for $BROWSER..."
          echo '#!/bin/bash' > "$BASH_FILE"
          echo '# Auto-generated cache clearing script' >> "$BASH_FILE"
          echo "# Browser: $BROWSER" >> "$BASH_FILE"
          echo "# Website: $WEBSITE" >> "$BASH_FILE"
          echo "# Generated: $(date -u)" >> "$BASH_FILE"
          echo '' >> "$BASH_FILE"
          echo 'set -euo pipefail' >> "$BASH_FILE"
          echo '' >> "$BASH_FILE"
          
          case "$BROWSER" in
            tor-browser)
              cat >> "$BASH_FILE" << 'EOF'
          # Tor Browser on Tails/Linux
          PROFILE_DIRS=(
            "$HOME/.tor-browser/profile.default"
            "$HOME/.tor-browser/profile.default-esr"
            "$HOME/Browser/TorBrowser/Data/Browser/profile.default"
            "/home/amnesia/.tor-browser/profile.default"
            "/home/amnesia/.tor-browser/profile.default-esr"
          )
          
          for PROFILE_DIR in "${PROFILE_DIRS[@]}"; do
            if [ -d "$PROFILE_DIR" ]; then
              echo "Found Tor Browser profile: $PROFILE_DIR"
              rm -f "$PROFILE_DIR/cookies.sqlite"*
              rm -f "$PROFILE_DIR/webappsstore.sqlite"*
              rm -f "$PROFILE_DIR/permissions.sqlite"*
              echo "✓ Cache cleared"
              break
            fi
          done
          EOF
              CACHE_PATHS='["~/.tor-browser/profile.default", "~/.tor-browser/profile.default-esr"]'
              ;;
            firefox)
              cat >> "$BASH_FILE" << 'EOF'
          # Firefox Browser
          FIREFOX_PROFILES="$HOME/.mozilla/firefox"
          
          if [ -d "$FIREFOX_PROFILES" ]; then
            echo "Clearing Firefox cache and cookies..."
            rm -rf "$FIREFOX_PROFILES"/*/cache*
            rm -rf "$FIREFOX_PROFILES"/*/cookies.sqlite*
            rm -rf "$FIREFOX_PROFILES"/*/storage
            rm -rf "$FIREFOX_PROFILES"/*/indexedDB
            echo "✓ Firefox cache cleared"
          else
            echo "Firefox profile directory not found"
            exit 1
          fi
          EOF
              CACHE_PATHS='["~/.mozilla/firefox/*/cache*"]'
              ;;
            chrome)
              cat >> "$BASH_FILE" << 'EOF'
          # Google Chrome Browser
          CHROME_CACHE="$HOME/.config/google-chrome/Default"
          
          if [ -d "$CHROME_CACHE" ]; then
            echo "Clearing Google Chrome cache and cookies..."
            rm -rf "$CHROME_CACHE/Cache"*
            rm -rf "$CHROME_CACHE/Code Cache"
            rm -rf "$CHROME_CACHE/Application Cache"
            rm -f "$CHROME_CACHE/Cookies"*
            echo "✓ Chrome cache cleared"
          else
            echo "Chrome cache directory not found"
            exit 1
          fi
          EOF
              CACHE_PATHS='["~/.config/google-chrome/Default/Cache*"]'
              ;;
            safari)
              cat >> "$BASH_FILE" << 'EOF'
          # Safari Browser (macOS)
          if [[ "$OSTYPE" != "darwin"* ]]; then
            echo "Safari is only available on macOS"
            exit 1
          fi
          
          echo "Clearing Safari cache and cookies..."
          rm -rf ~/Library/Caches/com.apple.Safari
          rm -rf ~/Library/Safari/History.db*
          rm -rf ~/Library/Safari/TopSites.plist
          echo "✓ Safari cache cleared"
          EOF
              CACHE_PATHS='["~/Library/Caches/com.apple.Safari"]'
              ;;
            edge)
              cat >> "$BASH_FILE" << 'EOF'
          # Microsoft Edge Browser
          EDGE_CACHE="$HOME/.config/microsoft-edge/Default"
          
          if [ -d "$EDGE_CACHE" ]; then
            echo "Clearing Microsoft Edge cache and cookies..."
            rm -rf "$EDGE_CACHE/Cache"*
            rm -rf "$EDGE_CACHE/Code Cache"
            rm -f "$EDGE_CACHE/Cookies"*
            echo "✓ Edge cache cleared"
          else
            echo "Edge cache directory not found"
            exit 1
          fi
          EOF
              CACHE_PATHS='["~/.config/microsoft-edge/Default/Cache*"]'
              ;;
          esac
          
          chmod +x "$BASH_FILE"
          echo "✓ Bash script generated: $BASH_FILE"
          
          # ============= POWERSHELL SCRIPT =============
          PS_FILE="$SCRIPT_DIR/clear-${BROWSER}-cache.ps1"
          
          echo "Generating PowerShell script for $BROWSER..."
          cat > "$PS_FILE" << 'EOF'
          # Auto-generated cache clearing script for Windows
          # Browser: $BROWSER
          # Website: $WEBSITE
          # Generated: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
          
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          EOF
          
          case "$BROWSER" in
            tor-browser)
              cat >> "$PS_FILE" << 'EOF'
          
          # Tor Browser Profile Detection
          $profileDirs = @(
            "$env:APPDATA\Tor Browser\profile.default",
            "$env:APPDATA\Tor Browser\profile.default-esr",
            "$env:LOCALAPPDATA\Tor Browser\profile.default"
          )
          
          foreach ($profileDir in $profileDirs) {
            if (Test-Path $profileDir) {
              Write-Host "Found Tor Browser profile: $profileDir"
              Remove-Item -Path "$profileDir\cookies.sqlite*" -Force -ErrorAction SilentlyContinue
              Remove-Item -Path "$profileDir\webappsstore.sqlite*" -Force -ErrorAction SilentlyContinue
              Remove-Item -Path "$profileDir\permissions.sqlite*" -Force -ErrorAction SilentlyContinue
              Write-Host "✓ Cache cleared"
              break
            }
          }
          EOF
              ;;
            firefox)
              cat >> "$PS_FILE" << 'EOF'
          
          $firefoxProfile = "$env:APPDATA\Mozilla\Firefox"
          
          if (Test-Path $firefoxProfile) {
            Write-Host "Clearing Firefox cache and cookies..."
            Get-ChildItem -Path $firefoxProfile -Filter "cache*" -Recurse | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
            Get-ChildItem -Path $firefoxProfile -Filter "cookies.sqlite*" -Recurse | Remove-Item -Force -ErrorAction SilentlyContinue
            Write-Host "✓ Firefox cache cleared"
          } else {
            Write-Host "Firefox profile directory not found"
            exit 1
          }
          EOF
              ;;
            chrome)
              cat >> "$PS_FILE" << 'EOF'
          
          $chromePath = "$env:LOCALAPPDATA\Google\Chrome\User Data\Default"
          
          if (Test-Path $chromePath) {
            Write-Host "Clearing Google Chrome cache and cookies..."
            Remove-Item -Path "$chromePath\Cache" -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item -Path "$chromePath\Code Cache" -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item -Path "$chromePath\Cookies*" -Force -ErrorAction SilentlyContinue
            Write-Host "✓ Chrome cache cleared"
          } else {
            Write-Host "Chrome cache directory not found"
            exit 1
          }
          EOF
              ;;
            edge)
              cat >> "$PS_FILE" << 'EOF'
          
          $edgePath = "$env:LOCALAPPDATA\Microsoft\Edge\User Data\Default"
          
          if (Test-Path $edgePath) {
            Write-Host "Clearing Microsoft Edge cache and cookies..."
            Remove-Item -Path "$edgePath\Cache" -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item -Path "$edgePath\Code Cache" -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item -Path "$edgePath\Cookies*" -Force -ErrorAction SilentlyContinue
            Write-Host "✓ Edge cache cleared"
          } else {
            Write-Host "Edge cache directory not found"
            exit 1
          }
          EOF
              ;;
          esac
          
          echo "✓ PowerShell script generated: $PS_FILE"
          
          # ============= JAVASCRIPT CODE (Node.js) =============
          JS_FILE="$SCRIPT_DIR/clear-${BROWSER}-cache.js"
          
          echo "Generating JavaScript code for $BROWSER..."
          cat > "$JS_FILE" << 'EOF'
          // Auto-generated cache clearing script (Node.js)
          // Browser: $BROWSER
          // Website: $WEBSITE
          // Generated: new Date().toISOString()
          // Usage: node clear-cache.js
          
          const fs = require('fs');
          const path = require('path');
          const os = require('os');
          
          const browser = process.env.BROWSER || '$BROWSER';
          const homeDir = os.homedir();
          
          function deleteRecursive(dirPath) {
            if (fs.existsSync(dirPath)) {
              fs.readdirSync(dirPath).forEach(file => {
                const curPath = path.join(dirPath, file);
                if (fs.lstatSync(curPath).isDirectory()) {
                  deleteRecursive(curPath);
                } else {
                  fs.unlinkSync(curPath);
                }
              });
              fs.rmdirSync(dirPath);
            }
          }
          
          async function clearCache() {
            console.log(`Clearing cache for: ${browser}`);
            
            try {
              switch(browser) {
                case 'firefox':
                  const firefoxPath = path.join(homeDir, '.mozilla', 'firefox');
                  if (fs.existsSync(firefoxPath)) {
                    fs.readdirSync(firefoxPath).forEach(profile => {
                      const cachePath = path.join(firefoxPath, profile, 'cache2');
                      if (fs.existsSync(cachePath)) deleteRecursive(cachePath);
                      
                      const cookiePath = path.join(firefoxPath, profile, 'cookies.sqlite');
                      if (fs.existsSync(cookiePath)) fs.unlinkSync(cookiePath);
                    });
                    console.log('✓ Firefox cache cleared');
                  }
                  break;
                  
                case 'chrome':
                  const chromePath = process.platform === 'darwin'
                    ? path.join(homeDir, 'Library', 'Application Support', 'Google', 'Chrome')
                    : (process.platform === 'win32'
                      ? path.join(process.env.LOCALAPPDATA, 'Google', 'Chrome', 'User Data')
                      : path.join(homeDir, '.config', 'google-chrome'));
                  
                  if (fs.existsSync(chromePath)) {
                    const cachePath = path.join(chromePath, 'Default', 'Cache');
                    if (fs.existsSync(cachePath)) deleteRecursive(cachePath);
                    console.log('✓ Chrome cache cleared');
                  }
                  break;
                  
                case 'safari':
                  if (process.platform === 'darwin') {
                    const safariCache = path.join(homeDir, 'Library', 'Caches', 'com.apple.Safari');
                    if (fs.existsSync(safariCache)) deleteRecursive(safariCache);
                    console.log('✓ Safari cache cleared');
                  } else {
                    console.error('Safari is only available on macOS');
                    process.exit(1);
                  }
                  break;
                  
                case 'edge':
                  const edgePath = process.platform === 'win32'
                    ? path.join(process.env.LOCALAPPDATA, 'Microsoft', 'Edge', 'User Data')
                    : path.join(homeDir, '.config', 'microsoft-edge');
                  
                  if (fs.existsSync(edgePath)) {
                    const cachePath = path.join(edgePath, 'Default', 'Cache');
                    if (fs.existsSync(cachePath)) deleteRecursive(cachePath);
                    console.log('✓ Edge cache cleared');
                  }
                  break;
                  
                default:
                  console.error(`Browser not supported: ${browser}`);
                  process.exit(1);
              }
            } catch (error) {
              console.error('Error clearing cache:', error);
              process.exit(1);
            }
          }
          
          clearCache();
          EOF
          
          echo "✓ JavaScript code generated: $JS_FILE"
          
          # Store outputs
          BASH_CONTENT=$(cat "$BASH_FILE")
          PS_CONTENT=$(cat "$PS_FILE")
          JS_CONTENT=$(cat "$JS_FILE")
          
          echo "bash_script_path=$BASH_FILE" >> "$GITHUB_OUTPUT"
          echo "powershell_script_path=$PS_FILE" >> "$GITHUB_OUTPUT"
          echo "cache_paths=$CACHE_PATHS" >> "$GITHUB_OUTPUT"
          
          # Store JavaScript content with EOF handling
          echo "javascript_code<<JSCODE" >> "$GITHUB_OUTPUT"
          cat "$JS_FILE" >> "$GITHUB_OUTPUT"
          echo "JSCODE" >> "$GITHUB_OUTPUT"

      - name: Upload multi-platform cache clearing scripts
        uses: actions/upload-artifact@v4
        with:
          name: cache-clearing-scripts
          path: cache-clearing-scripts/
          retention-days: 7

      - name: Generate summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Multi-Platform Cache Clearing Artifacts Generated
          
          - **Browser**: ${{ inputs.target_browser }}
          - **Website**: ${{ inputs.target_website }}
          - **Output Format**: ${{ inputs.output_format }}
          
          ### Generated Artifacts
          - Bash Script: \`.github/workflows/cache-clearing-scripts/clear-${{ inputs.target_browser }}-cache.sh\`
          - PowerShell Script: \`.github/workflows/cache-clearing-scripts/clear-${{ inputs.target_browser }}-cache.ps1\`
          - JavaScript (Node.js): \`.github/workflows/cache-clearing-scripts/clear-${{ inputs.target_browser }}-cache.js\`
          
          **All scripts are available for download in the Artifacts section**
          EOF
