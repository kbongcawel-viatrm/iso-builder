name: Harden Config

on:
  workflow_dispatch: 

permissions: write-all

jobs:
    harden-configuration:
     runs-on: [self-hosted, qubes]
    
     steps:
      - name: Checkout scripts from main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Run scripts/sysprep as root
        run: |
          set -euo pipe fail 
          sudo chmod +x scripts/sysprep
          sudo bash scripts/sysprep
          echo "✓ sysprep success"
          
      - name: Copy and configure system-freeze.sh
        run: |
          set -euo pipefail
          sudo cp scripts/system-freeze.sh /usr/local/bin/system-freeze.sh
          sudo chmod +x /usr/local/bin/system-freeze.sh
          echo "✓ system-freeze.sh installed and made executable"

      - name: Create systemd service file
        run: |
          set -euo pipefail
          sudo mkdir -p /etc/systemd/system
          sudo tee /etc/systemd/system/system-freeze.service > /dev/null << 'EOF'
          [Unit]
          Description=Freeze Kernel and Enforce Read-Only Boundaries
          DefaultDependencies=no
          After=local-fs.target
          Before=sysinit.target systemd-sysctl.service
          Conflicts=shutdown.target

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/usr/local/bin/system-freeze.sh
          StandardOutput=journal+console

          [Install]
          WantedBy=sysinit.target
          EOF
          echo "✓ system-freeze.service created"

      - name: Enable system-freeze service
        run: |
          set -euo pipefail
          sudo systemctl daemon-reload
          sudo systemctl enable system-freeze.service
          echo "✓ system-freeze.service enabled"
          
      - name: Harden Grub
        run: |
          set -euo pipefail
          sudo chmod +x scripts/secure-grub-unrestricted.sh
          sudo bash scripts/secure-grub-unrestricted.sh {{ secrets.GRUB_PW }} {{ secrets.GRUB_ADMIN }}
          echo "✓ grub hardened"

      - name: Remove scripts folder
        run: |
          set -euo pipefail
          sudo rm -rf scripts
          echo "✓ scripts folder removed"
